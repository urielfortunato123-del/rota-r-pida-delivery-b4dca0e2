<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>RotaRápida — Motoboy sob demanda para restaurantes</title>
    <meta name="description" content="Conectamos restaurantes a motoboys disponíveis em tempo real. Rápido, simples e sem contrato." />
    <meta name="author" content="RotaRápida" />
    <meta name="theme-color" content="#DC2626" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RotaRápida" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Preload da logo do splash + ícone do PWA pra aparecer instantâneo -->
    <link rel="preload" as="image" href="/icon-512.png" fetchpriority="high" />

    <!-- Splash inline mostrado ANTES do React montar (carregamento percebido instantâneo) -->
    <style>
      #initial-splash {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: hsl(0 0% 4%); color: hsl(0 0% 95%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        transition: opacity .3s ease;
      }
      #initial-splash img {
        width: 128px; height: 128px; border-radius: 24px;
        box-shadow: 0 0 40px rgba(220, 38, 38, .35);
        animation: is-pulse 1.4s ease-in-out infinite;
      }
      #initial-splash h1 { margin: 24px 0 4px; font-size: 24px; font-weight: 700; }
      #initial-splash p  { margin: 0; font-size: 13px; color: hsl(0 0% 55%); }
      @keyframes is-pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
    </style>

    <meta property="og:title" content="RotaRápida — Motoboy sob demanda" />
    <meta property="og:description" content="Conectamos restaurantes a motoboys em tempo real. Rápido, simples e sem contrato." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="RotaRápida — Motoboy sob demanda" />
    <meta property="og:site_name" content="RotaRápida" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RotaRápida — Motoboy sob demanda" />
    <meta name="twitter:description" content="Conectamos restaurantes a motoboys em tempo real." />
    <meta name="twitter:image" content="/og-image.jpg" />
  </head>

  <body>
    <div id="initial-splash" aria-label="Carregando RotaRápida">
      <img src="/icon-512.png" alt="RotaRápida" width="128" height="128" fetchpriority="high" />
      <h1>RotaRápida</h1>
      <p>Motoboy sob demanda</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove o splash inline assim que o React montar (o SplashScreen do React assume)
      window.addEventListener('DOMContentLoaded', () => {
        const tryRemove = () => {
          if (document.getElementById('root')?.children.length) {
            const s = document.getElementById('initial-splash');
            if (s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 300); }
          } else {
            requestAnimationFrame(tryRemove);
          }
        };
        tryRemove();
      });
    </script>
  </body>
</html>
